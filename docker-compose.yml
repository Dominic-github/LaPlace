services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: laplace_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: laplace_db
      MYSQL_USER: laplace
      MYSQL_PASSWORD: 123456
    ports:
      - "7205:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - laplace_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: laplace_server
    restart: unless-stopped
    ports:
      - "7201:8000"
    environment:
      NODE_ENV: development
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: laplace
      DB_PASSWORD: 123456
      DB_NAME: laplace_db
      JWT_SECRET: your-super-secret-key-change-this
      PORT: 8000
      APP_URL: http://localhost:7202,http://localhost:7203
      CLIENT_URL: http://localhost:7203
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./server/public/uploads:/app/public/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - laplace_network
    command: yarn dev

  # phpMyAdmin - Database Management
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: laplace_phpmyadmin
    restart: unless-stopped
    ports:
      - "7204:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
      UPLOAD_LIMIT: 100M
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - laplace_network

  # Admin Panel - Refine + React + Vite
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      target: dev
    container_name: laplace_admin
    restart: unless-stopped
    ports:
      - "7202:7202"
    environment:
      VITE_API_URL: http://localhost:7201/api
    volumes:
      - ./admin:/app
      - /app/node_modules
    networks:
      - laplace_network
    command: npm run dev



  # Client Website
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: dev
    container_name: laplace_client
    restart: unless-stopped
    ports:
      - "7203:7203"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:7201
      NEXT_PUBLIC_SITE_URL: http://localhost:7203
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    networks:
      - laplace_network
    command: npm run dev

networks:
  laplace_network:
    driver: bridge

volumes:
  mysql_data:
